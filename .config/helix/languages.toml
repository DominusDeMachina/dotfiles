[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "biome"]
formatter = { command = "biome", args = ["format", "--stdin-file-path", "file.ts"] }
auto-format = true

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "biome"]
formatter = { command = "biome", args = ["format", "--stdin-file-path", "file.tsx"] }
auto-format = true

[[language]]
name = "javascript"
language-servers = ["typescript-language-server", "biome"]
formatter = { command = "biome", args = ["format", "--stdin-file-path", "file.js"] }
auto-format = true

[[language]]
name = "json"
language-servers = ["vscode-json-language-server", "biome"]
formatter = { command = "biome", args = ["format", "--stdin-file-path", "file.json"] }
auto-format = true

[[language]]
name = "python"
language-servers = ["pyright", "ruff-lsp"]
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = true

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.ruff]
command = "ruff-lsp"

[language.debugger]
name = "debugpy"
transport = "stdio"
command = "python"
args = ["-m", "debugpy.adapter"]

[[language.debugger.templates]]
name = "launch"
request = "launch"
[[language.debugger.templates.completion]]
  name = "entrypoint"
  completion = "filename"
[language.debugger.templates.args]
  mode = "launch"
  program = "{0}"

[[language.debugger.templates]]
name = "attach"
request = "attach"
[language.debugger.templates.args]
  mode = "attach"
  host = "127.0.0.1"
  port = "5678"

