# ~/.config/starship.toml

format = """
$directory$git_branch$git_status$nodejs$package
$character"""

# ─── Prompt character ─────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# ─── Directory ────────────────────────────────────────────
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"

# ─── Git ──────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 24

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

# ─── Node / NVM ───────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold green"
# Показывает версию только если есть .nvmrc или package.json рядом
detect_files = [".nvmrc", ".node-version", "package.json"]
detect_folders = ["node_modules"]

# ─── Package version (из package.json) ────────────────────
[package]
symbol = "󰏗 "
style = "bold dimmed white"
display_private = false

# ─── Отключаем лишнее ─────────────────────────────────────
[python]
disabled = true

[ruby]
disabled = true

[java]
disabled = true

